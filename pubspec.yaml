name: task_manager
description: A professional Task Manager built with Flutter + Firebase (Firestore + Auth).
publish_to: "none"

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase - CẬP NHẬT LÊN PHIÊN BẢN MỚI
  firebase_core: ^2.32.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.7.7
  image_cropper: ^7.0.0
  permission_handler: ^11.3.1
  fl_chart: ^0.66.0
  # State management and utils
  provider: ^6.1.2
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  image_picker: ^1.0.7
  # UI & helpers
  uuid: ^4.5.1
  intl: ^0.19.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true