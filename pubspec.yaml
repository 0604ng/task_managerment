name: task_manager
description: A professional Task Manager built with Flutter + Firebase (Firestore + Auth).
publish_to: "none"

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase - CẬP NHẬT LÊN PHIÊN BẢN MỚI
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0

  # State management and utils
  provider: ^6.1.2
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # UI & helpers
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true